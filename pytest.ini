[pytest]
# Tests live at repo root: tests/
testpaths = tests
# Monorepo checkout: match ``[tool.pytest.ini_options]`` in ``pyproject.toml`` (this file wins over pyproject).
pythonpath =
    .
    ../fastx_platform/src
    ../fastx_middleware/src
    ../fastx_database/src
    ../fastx_dashboards/src
    ../fastx_channels/src
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Default run: no coverage gate (use `pytest --cov=...` in CI when needed)
addopts = -v

# Ignore patterns
norecursedirs =
    .git
    __pycache__
    htmlcov
    .pytest_cache
    venv
    .venv
    node_modules

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow running tests
    framework: FastX framework tests (run with --framework)
