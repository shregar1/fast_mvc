# Postgres + Redis + migrations; merges with docker-compose.yml. Use: COMPOSE_FILE=docker-compose.yml:docker-compose.local.yml

x-local-db-redis: &local-db-redis
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: ${POSTGRES_DB:-{{PROJECT_SLUG}}}
  DATABASE_USER: ${POSTGRES_USER:-postgres}
  DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  DATABASE_URL: ${DATABASE_URL:-}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_URL: ${REDIS_URL:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-{{PROJECT_SLUG}}}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./_maint/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - fastx-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-{{PROJECT_SLUG}}}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - fastx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: true
    environment:
      <<: *local-db-redis
      RUN_MIGRATIONS: "false"
    command: >
      sh -c "echo '⏳ Waiting for dependencies...' && sleep 2 && echo '⏭️  Skipping alembic migrations (no scripts/)' && exit 0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastx-network

  app:
    environment:
      <<: *local-db-redis
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    environment:
      <<: *local-db-redis
    depends_on:
      - postgres
      - redis

  scheduler:
    environment:
      <<: *local-db-redis
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
