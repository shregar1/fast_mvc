# Build and push a Docker image to Amazon ECR (OIDC — no long-lived access keys).
#
# Trigger: workflow_dispatch only (add "push: branches: [main]" when ready).
#
# Prerequisites:
#   - ECR repository, IAM role for GitHub OIDC, ECS/Kubernetes/App Runner/etc. to consume the image
#   - Dockerfile at repo root
#
# GitHub → Settings → Actions → General: enable "Read and write permissions" if modifying workflows from Actions.
#
# AWS: create an IAM OIDC provider + role trusted by repo
#   token.actions.githubusercontent.com sub claim: repo:ORG/REPO:ref:refs/heads/main
#
# GitHub Actions secret:
#   AWS_ROLE_ARN — IAM role ARN to assume (OIDC)
#
# GitHub Actions variables:
#   AWS_REGION           — e.g. us-east-1
#   AWS_ECR_REPOSITORY   — ECR repository name (created in AWS console / IaC)
#
# After push, point your orchestrator (ECS service, Kustomize, Helm, CodeDeploy) at:
#   $REGISTRY/$AWS_ECR_REPOSITORY:${{ github.sha }}
# or add a follow-up job that updates ECS / triggers App Runner / etc.

name: Deploy to AWS (ECR)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Verify AWS configuration
        run: |
          missing=0
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then echo "::error::Set secret AWS_ROLE_ARN (IAM role for OIDC)"; missing=1; fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then echo "::error::Set variable AWS_REGION"; missing=1; fi
          if [ -z "${{ vars.AWS_ECR_REPOSITORY }}" ]; then echo "::error::Set variable AWS_ECR_REPOSITORY"; missing=1; fi
          exit "$missing"

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
