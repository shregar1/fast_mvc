# App + worker + optional Caddy on external network. Local DB: add docker-compose.local.yml (see .env COMPOSE_FILE).
# Prereq: `docker network create ${EDGE_NETWORK_NAME:-fastx-edge}` and repo-root `.env`.

name: {{PROJECT_SLUG}}

x-app-in-container: &app-in-container
  HOST: "0.0.0.0"
  PORT: "8000"
  RUN_MIGRATIONS: "false"

x-app-base: &app-base
  image: {{PROJECT_SLUG}}-app
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: true
  restart: unless-stopped
  networks:
    - fastx-network
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  deploy:
    resources:
      limits:
        cpus: "1"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

services:
  app:
    <<: *app-base
    environment:
      <<: *app-in-container
      GRPC_PORT: ${GRPC_PORT:-51051}
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${GRPC_PORT:-51051}:${GRPC_PORT:-51051}"

  worker:
    image: {{PROJECT_SLUG}}-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: true
    restart: unless-stopped
    command:
      - celery
      - -A
      - core.tasks
      - worker
      - --loglevel=${LOG_LEVEL:-INFO}
      - --concurrency=2
      - --max-tasks-per-child=1000
    networks:
      - fastx-network
    profiles:
      - "worker"
      - "full"

  scheduler:
    image: {{PROJECT_SLUG}}-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: true
    restart: unless-stopped
    command:
      - celery
      - -A
      - core.tasks
      - beat
      - --loglevel=${LOG_LEVEL:-INFO}
    networks:
      - fastx-network
    profiles:
      - "worker"
      - "full"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${HTTP3_UDP_PORT:-443}:443/udp"
    volumes:
      - ./_maint/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - fastx-network
    profiles:
      - "caddy"
      - "full"

networks:
  fastx-network:
    external: true
    name: ${EDGE_NETWORK_NAME:-fastx-edge}
